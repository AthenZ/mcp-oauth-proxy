apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-oauth-proxy.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "mcp-oauth-proxy.labels" . | nindent 4 }}
data:
  application.yaml: |
    quarkus:
      http:
        ssl-port: {{ .Values.service.targetPort }}
        insecure-requests: disabled
        access-log:
          enabled: true
          pattern: "%h %t \"%r\" %s %b"
          exclude-pattern: "/q/.*"
        tls-configuration-name: enterprise
        ssl:
          client-auth: request
        auth:
          permission:
            health:
              paths: "/q/health/*"
              policy: "permit"
            embrace-internal-userinfo:
              paths: "/internal/embrace/oauth-userinfo"
              policy: permit
            datadog-internal-userinfo:
              paths: "/internal/datadog/oauth-userinfo"
              policy: permit
            linear-internal-userinfo:
              paths: "/internal/linear/oauth-userinfo"
              policy: permit
            wisdomai-internal-userinfo:
              paths: "/internal/wisdomai/oauth-userinfo"
              policy: permit
            oracle-epm-internal-userinfo:
              paths: "/internal/oracle-epm/oauth-userinfo"
              policy: permit
            authorize-error:
              paths: "/authorize/error"
              policy: permit
            atlassian-mcp:
              paths: "/atlassian-mcp/*"
              policy: authenticated
            atlassian:
              paths: "/atlassian/*"
              policy: authenticated
            github:
              paths: "/github/*"
              policy: authenticated
            {{- range .Values.googleWorkspaceServices }}
            {{ .name }}:
              paths: "/{{ .name }}/*"
              policy: authenticated
            {{- end }}
            slack:
              paths: "/slack/*"
              policy: authenticated
            figma:
              paths: "/figma/*"
              policy: authenticated
            datadog:
              paths: "/datadog/*"
              policy: authenticated
            linear:
              paths: "/linear/*"
              policy: authenticated
            wisdomai:
              paths: "/wisdomai/*"
              policy: authenticated
            oracle-epm:
              paths: "/oracle-epm/*"
              policy: authenticated
            airtable:
              paths: "/airtable/*"
              policy: authenticated
            embrace:
              paths: "/embrace/*"
              policy: authenticated
        cors:
          enabled: true
          origins: http://localhost:6274 # allow mcp inspector
          methods: GET,PUT,POST

      tls:
        protocols: {{ .Values.application.tls.protocols | quote }}
        cipher-suites: {{ .Values.application.tls.cipherSuites | quote }}
        reload-period: {{ .Values.application.tls.reloadPeriod | quote }}
{{- if (.Values.oidc.embrace.tlsInsecureClient | default false) }}
        embrace-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}
{{- if (.Values.oidc.datadog.tlsInsecureClient | default false) }}
        datadog-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}
{{- if (.Values.oidc.linear.tlsInsecureClient | default false) }}
        linear-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}
{{- if (.Values.oidc.wisdomAi.tlsInsecureClient | default false) }}
        # WisdomAI tenant only: required when synthetic UserInfo is served from
        # https://localhost:<ssl-port>/internal/wisdomai/oauth-userinfo (in-pod loopback).
        # Trusts the local self-signed cert and skips hostname verification. Mirrors Linear.
        wisdomai-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}
{{- if (.Values.oidc.oracleEpm.tlsInsecureClient | default false) }}
        # Oracle EPM tenant only: required when synthetic UserInfo is served from
        # https://localhost:<ssl-port>/internal/oracle-epm/oauth-userinfo (in-pod loopback).
        # Trusts the local self-signed cert and skips hostname verification. Mirrors Embrace.
        oracle-epm-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}

      log:
        console:
          format: "%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n"
        level: INFO
        category:
          "io.quarkus.oidc.runtime":
            level: INFO
            min-level: INFO

      oidc:
        auth-server-url: {{ .Values.oidc.authServerUrl | quote }}
        client-id: {{ .Values.oidc.clientId | quote }}
        credentials:
          client-secret:
            provider:
              key: {{ .Values.oidc.clientSecretKey }}
            method: post
        authentication:
          scopes:
          {{- range .Values.oidc.scopes }}
            - {{ . | quote }}
          {{- end }}
          redirect-path: /authorize/callback
          restore-path-after-redirect: true
          error-path: /authorize/error
        application-type: web-app
        atlassian:
          auth-server-url: {{ .Values.oidc.atlassian.endpoint | quote }}
          client-id: {{ .Values.oidc.atlassian.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.atlassian.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range .Values.oidc.atlassian.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /atlassian/authorize/callback
            restore-path-after-redirect: true
            extra-params:
              audience: "api.atlassian.com"
              prompt: "consent"
            add-openid-scope: false
            id-token-required: false
          application-type: web-app
          token-state-manager:
            strategy: keep-all-tokens
          user-info-path: {{ .Values.oidc.atlassian.userInfoPath | quote }}
          token:
            issuer: any
        github:
          provider: github
          client-id: {{ .Values.oidc.github.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.github.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range .Values.oidc.github.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /github/authorize/callback
            restore-path-after-redirect: true
        {{- range .Values.googleWorkspaceServices }}
        {{ .name }}:
          provider: google
          client-id: {{ $.Values.oidc.googleWorkspace.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ $.Values.oidc.googleWorkspace.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range (index $.Values.oidc .scopesKey).scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /{{ .name }}/authorize/callback
            restore-path-after-redirect: true
            extra-params:
              access_type: "offline"
        {{- end }}
        slack:
          auth-server-url: "https://slack.com"
          discovery-enabled: false
          authorization-path: "/oauth/v2/authorize"
          token-path: "/api/oauth.v2.user.access"
          user-info-path: "https://slack.com/api/auth.test"
          client-id: {{ .Values.oidc.slack.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.slack.clientSecretKey }}
              method: post
          authentication:
            scopes: []
            redirect-path: /slack/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            extra-params:
              user_scope: {{ .Values.oidc.slack.userScopes | quote }}
              team: {{ .Values.oidc.slack.team | quote }}
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        figma:
          auth-server-url: "https://www.figma.com"
          discovery-enabled: false
          authorization-path: "/oauth/mcp"
          token-path: "https://api.figma.com/v1/oauth/token"
          user-info-path: "https://api.figma.com/v1/me"
          client-id: {{ .Values.oidc.figma.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.figma.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range .Values.oidc.figma.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /figma/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            pkce-required: true
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        datadog:
{{- if (.Values.oidc.datadog.tlsInsecureClient | default false) }}
          tls:
            tls-configuration-name: datadog-insecure-client
{{- end }}
          auth-server-url: "https://app.datadoghq.com"
          discovery-enabled: false
          authorization-path: "/oauth2/v1/authorize"
          token-path: "https://app.datadoghq.com/oauth2/v1/token"
          {{- if .Values.oidc.datadog.userInfoPath }}
          user-info-path: {{ .Values.oidc.datadog.userInfoPath | quote }}
          {{- else }}
          {{- $datadogUiBase := .Values.oidc.datadog.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/datadog/oauth-userinfo" $datadogUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.datadog.clientId | quote }}
          authentication:
            # Datadog's MCP integration requires zero scopes by default; the issued AT carries
            # an implicit MCP grant tied to the customer site. The `default (list)` keeps the
            # empty-by-default contract while still letting an env override request scopes
            # explicitly via `oidc.datadog.scopes`.
            {{- $datadogScopes := .Values.oidc.datadog.scopes | default (list) }}
            {{- if gt (len $datadogScopes) 0 }}
            scopes:
            {{- range $datadogScopes }}
              - {{ . | quote }}
            {{- end }}
            {{- else }}
            scopes: []
            {{- end }}
            redirect-path: /datadog/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            pkce-required: true
            extra-params:
              resource: {{ .Values.oidc.datadog.resource | default "https://mcp.datadoghq.com/v1/mcp" | quote }}
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        linear:
          # Linear is a public PKCE client (no client_secret). Comma-separated scope is forced
          # via extra-params.scope; authentication.scopes stays empty so Quarkus emits no scope.
          # actor=user is required on /authorize.
{{- if (.Values.oidc.linear.tlsInsecureClient | default false) }}
          tls:
            tls-configuration-name: linear-insecure-client
{{- end }}
          auth-server-url: "https://linear.app"
          discovery-enabled: false
          authorization-path: "/oauth/authorize"
          token-path: "https://api.linear.app/oauth/token"
          {{- if .Values.oidc.linear.userInfoPath }}
          user-info-path: {{ .Values.oidc.linear.userInfoPath | quote }}
          {{- else }}
          {{- $linearUiBase := .Values.oidc.linear.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/linear/oauth-userinfo" $linearUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.linear.clientId | quote }}
          authentication:
            scopes: []
            redirect-path: /linear/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            pkce-required: true
            extra-params:
              actor: "user"
              scope: {{ .Values.oidc.linear.scope | default "comments:create,issues:create,read,timeSchedule:write,write" | quote }}
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        wisdomai:
          # WisdomAI (Descope-backed) is a public PKCE client today (DCR returns no client_secret).
          # Authorize lives at wisdom.ouryahoo.com; token endpoint is on api.descope.com (split
          # hosts → token-path is an absolute URL). Userinfo is sourced from a synthetic GraphQL
          # proxy that runs `query CurrentUser { currentUser { id name email } }`.
{{- if (.Values.oidc.wisdomAi.tlsInsecureClient | default false) }}
          tls:
            tls-configuration-name: wisdomai-insecure-client
{{- end }}
          auth-server-url: {{ .Values.oidc.wisdomAi.authServerUrl | default "https://wisdom.ouryahoo.com" | quote }}
          discovery-enabled: false
          authorization-path: "/authorize"
          token-path: {{ .Values.oidc.wisdomAi.tokenEndpoint | default "https://api.descope.com/oauth2/v1/apps/token" | quote }}
          # Descope JWKS for id_token RS256 signature verification. Project id is embedded in
          # the id_token's `iss` (https://api.descope.com/v1/apps/<projectId>). Without this
          # Quarkus falls back to /introspect which Descope does not expose, yielding 401 on
          # the callback ("token can not be introspected because the introspection endpoint
          # address is unknown"). Operator-tunable per env via .Values.oidc.wisdomAi.jwksUrl.
          jwks-path: {{ .Values.oidc.wisdomAi.jwksUrl | quote }}
          {{- if .Values.oidc.wisdomAi.userInfoPath }}
          user-info-path: {{ .Values.oidc.wisdomAi.userInfoPath | quote }}
          {{- else }}
          {{- $wisdomAiUiBase := .Values.oidc.wisdomAi.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/wisdomai/oauth-userinfo" $wisdomAiUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.wisdomAi.clientId | quote }}
          credentials:
            # Descope confidential client. Although DCR registers as public, Descope's token
            # endpoint requires a client_secret on both code exchange and refresh (errorCode
            # E011002 "missing secret"). The K8s secret store provides the secret value via the
            # configured `clientSecretKey`. Default method is post, overridable via
            # .Values.oidc.wisdomAi.clientSecretMethod (post | basic) in case Descope changes it.
            client-secret:
              provider:
                key: {{ .Values.oidc.wisdomAi.clientSecretKey | default "wisdomai-client-secret" | quote }}
              method: {{ .Values.oidc.wisdomAi.clientSecretMethod | default "post" | quote }}
          authentication:
            # Descope returns an id_token unconditionally; jwks-path above lets Quarkus verify
            # it. Identity itself comes from the synthetic userinfo GraphQL proxy (id_token
            # unused for username), but accepting it keeps Quarkus' OIDC flow happy.
            scopes:
              {{- range ($.Values.oidc.wisdomAi.scopes | default (list "profile")) }}
              - {{ . | quote }}
              {{- end }}
            redirect-path: /wisdomai/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: true
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            pkce-required: true
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        oracle-epm:
          # Oracle IDCS confidential client (client_secret_post). openid is REQUIRED for the
          # id_token + working /userinfo response. The K8s secret store provides the
          # client_secret via `oracle-epm-client-secret` (operator-tunable via clientSecretKey).
{{- if (.Values.oidc.oracleEpm.tlsInsecureClient | default false) }}
          tls:
            # Required when synthetic UserInfo runs over in-pod https://localhost:<ssl-port>/...
            # The pod's egress policy blocks it from reaching its own public hostname; loopback
            # uses the local self-signed cert which the JVM trust store does not accept.
            tls-configuration-name: oracle-epm-insecure-client
{{- end }}
          auth-server-url: {{ .Values.oidc.oracleEpm.authServerUrl | default "https://idcs-c0b7a2ce098d48a0a78b94a30f9e42a1.identity.oraclecloud.com" | quote }}
          discovery-enabled: false
          authorization-path: "/oauth2/v1/authorize"
          token-path: "/oauth2/v1/token"
          # Oracle IDCS canonical JWKS endpoint for RS256 id_token signature verification. The
          # operator must enable "Access Signing Certificate" in the Oracle IDCS Console
          # (Settings > Default Settings) for this path to be public. Without jwks-path Quarkus
          # falls back to /introspect which Oracle does NOT authorize for this client.
          jwks-path: {{ .Values.oidc.oracleEpm.jwksPath | default "/admin/v1/SigningCert/jwk" | quote }}
          {{- if .Values.oidc.oracleEpm.userInfoPath }}
          user-info-path: {{ .Values.oidc.oracleEpm.userInfoPath | quote }}
          {{- else }}
          {{- $oracleEpmUiBase := .Values.oidc.oracleEpm.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/oracle-epm/oauth-userinfo" $oracleEpmUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.oracleEpm.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.oracleEpm.clientSecretKey | default "oracle-epm-client-secret" | quote }}
              method: post
          authentication:
            scopes:
              {{- range ($.Values.oidc.oracleEpm.scopes | default (list "openid" "urn:opc:resource:consumer::all" "offline_access")) }}
              - {{ . | quote }}
              {{- end }}
            redirect-path: /oracle-epm/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            # id-token-required: true because Oracle returns an id_token whenever openid is in
            # scope and Quarkus will attempt to verify it. JWKS path above makes signature
            # verification possible without falling back to /introspect (not authorized for
            # this client).
            id-token-required: true
            user-info-required: true
            verify-access-token: false
            pkce-required: true
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            # discovery is disabled, so iss is not auto-fetched. Skip iss validation; the
            # signature is still verified against jwks-path above.
            issuer: any
        airtable:
          # Airtable confidential PKCE client. Token endpoint uses HTTP Basic on the
          # `Authorization` header (Airtable's docs use `curl -u client_id:client_secret`); do
          # NOT switch to client_secret_post. Userinfo is served directly by api.airtable.com
          # as a flat JSON ({ id, email, scopes }) so Quarkus calls it directly — no synthetic
          # proxy and no in-pod loopback TLS trust block needed (Figma pattern). The MCP
          # resource indicator (RFC 8707) is required on /authorize so Airtable knows the
          # caller is asking for an MCP-scoped token (same shape as Datadog's extra-params).
          auth-server-url: "https://airtable.com"
          discovery-enabled: false
          authorization-path: "/oauth2/v1/authorize"
          token-path: "https://airtable.com/oauth2/v1/token"
          user-info-path: {{ .Values.oidc.airtable.userInfoPath | default "https://api.airtable.com/v0/meta/whoami" | quote }}
          client-id: {{ .Values.oidc.airtable.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.airtable.clientSecretKey | default "airtable-client-secret" | quote }}
              method: basic
          authentication:
            scopes:
              {{- range ($.Values.oidc.airtable.scopes | default (list "data.recordComments:read" "data.recordComments:write" "data.records:read" "data.records:write" "schema.bases:read" "user.email:read" "workspacesAndBases:read" "enterprise.groups:read")) }}
              - {{ . | quote }}
              {{- end }}
            redirect-path: /airtable/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            pkce-required: true
            extra-params:
              resource: {{ .Values.oidc.airtable.resourceIndicator | default "https://mcp.airtable.com" | quote }}
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        embrace:
{{- if (.Values.oidc.embrace.tlsInsecureClient | default false) }}
          tls:
            tls-configuration-name: embrace-insecure-client
{{- end }}
          discovery-enabled: false
          auth-server-url: {{ .Values.oidc.embrace.authServerUrl | quote }}
          authorization-path: {{ .Values.oidc.embrace.authorizationUrl | quote }}
          token-path: {{ .Values.oidc.embrace.tokenPath | quote }}
          jwks-path: {{ .Values.oidc.embrace.jwksPath | quote }}
          {{- if .Values.oidc.embrace.userInfoPath }}
          user-info-path: {{ .Values.oidc.embrace.userInfoPath | quote }}
          {{- else }}
          {{- $embraceUiBase := .Values.oidc.embrace.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/embrace/oauth-userinfo" $embraceUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.embrace.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.embrace.clientSecretKey | quote }}
              method: {{ .Values.oidc.embrace.clientSecretMethod | default "basic" | quote }}
          authentication:
            scopes:
            {{- range .Values.oidc.embrace.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /embrace/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: {{ .Values.oidc.embrace.tokenIssuer | quote }}
            verify-access-token-with-user-info: false

      otel:
        resource:
          attributes: service.name={{ include "mcp-oauth-proxy.serviceVersion" . }},service.instance.id=${POD_NAME},cloud.account.id=${CLOUD_ACCOUNT_ID}
        exporter:
          otlp:
            protocol: {{ .Values.application.otel.protocol }}
            endpoint: {{ .Values.application.otel.endpoint }}
            trust-cert:
              certs: {{ .Values.application.otel.trustStorePath | quote }}

      cache:
        caffeine:
          token-cache:
            initial-capacity: 10
            expire-after-write: PT30M
            maximum-size: 100
          code-cache:
            initial-capacity: 10
            expire-after-write: PT10M
            maximum-size: 100

    server:
      host: {{ .Values.application.host | quote }}
      {{- with .Values.application.allowedRedirectUriPrefixes }}
      allowed-redirect-uri-prefixes:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.application.allowedRedirectUriExact }}
      allowed-redirect-uri-exact:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      tls:
        certificate:
          path: {{ .Values.application.tls.certPath | quote }}
        private-key:
          path: {{ .Values.application.tls.keyPath | quote }}
        refresh:
          interval: {{ .Values.application.tls.refreshDuration | quote }}
        truststore:
          path: {{ .Values.application.tls.trustStorePath | quote }}
      athenz:
        cert-file: {{ .Values.athenz.certFilePath | quote }}
        key-file: {{ .Values.athenz.keyFilePath | quote }}
        truststore-file: {{ .Values.athenz.trustStorePath | quote }}
        user-prefix: {{ .Values.athenz.userPrefix | quote }}
        zms:
          endpoint: {{ .Values.application.zms.endpoint | quote }}
        zts:
          endpoint: {{ .Values.application.zts.endpoint | quote }}
        register:
          domain: {{ .Values.application.register.domain | quote }}
          role: {{ .Values.application.register.role | quote }}
        resource-authorization: false
        authorization-action: {{ .Values.application.authorization.action | quote }}
        authorization-domain: {{ .Values.application.authorization.domain | quote }}
      token-store:
        implementation: enterprise
        expiry: {{ .Values.application.tokenStore.expiry }}
        aws:
          dynamodb:
            table-name: {{ .Values.application.aws.dynamoDbTable | quote }}
          kms:
            key-id: {{ .Values.application.aws.kmsKeyId | quote }}
          sts:
            role-arn: {{ .Values.application.aws.stsRoleArn | quote }}
      refresh-token:
        table-name: {{ .Values.application.refreshToken.tableName | quote }}
        expiry-seconds: {{ .Values.application.refreshToken.expirySeconds }}
        ttl-buffer-days: {{ .Values.application.refreshToken.ttlBufferDays }}
        rotated-grace-seconds: {{ .Values.application.refreshToken.rotatedGraceSeconds | default 7200 }}
        family-idle-grace-seconds: {{ .Values.application.refreshToken.familyIdleGraceSeconds | default 0 }}
        inflight-cache-seconds: {{ .Values.application.refreshToken.inflightCacheSeconds | default 30 }}
        inflight-lock-ttl-seconds: {{ .Values.application.refreshToken.inflightLockTtlSeconds | default 30 }}
        inflight-lock-max-retries: {{ .Values.application.refreshToken.inflightLockMaxRetries | default 12 }}
        inflight-lock-initial-backoff-ms: {{ .Values.application.refreshToken.inflightLockInitialBackoffMs | default 100 }}
      refresh-lock:
        table-name: {{ .Values.application.refreshLock.tableName | quote }}
        ttl-seconds: {{ .Values.application.refreshLock.ttlSeconds }}
        {{- if .Values.application.refreshLock.instanceId }}
        instance-id: {{ .Values.application.refreshLock.instanceId | quote }}
        {{- end }}
        max-retries: {{ .Values.application.refreshLock.maxRetries }}
        initial-backoff-ms: {{ .Values.application.refreshLock.initialBackoffMs }}
      upstream-token:
        table-name: {{ .Values.application.upstreamToken.tableName | quote }}
        expiry-seconds-default: {{ .Values.application.upstreamToken.expirySecondsDefault | default "2592000" }}
        {{- with .Values.application.upstreamToken.expirySecondsByProvider }}
        expiry-seconds-by-provider:
          {{- range $provider, $seconds := . }}
          {{ $provider }}: {{ $seconds }}
          {{- end }}
        {{- end }}
        ttl-buffer-days: {{ .Values.application.upstreamToken.ttlBufferDays }}
        revoked-retention-days: {{ .Values.application.upstreamToken.revokedRetentionDays | default 14 }}
        l2-at-reuse-grace-seconds: {{ .Values.application.upstreamToken.l2AtReuseGraceSeconds | default 30 }}
        l2-at-reuse-min-remaining-seconds: {{ .Values.application.upstreamToken.l2AtReuseMinRemainingSeconds | default 60 }}
        replication-wait-millis: {{ .Values.application.upstreamToken.replicationWaitMillis | default 750 }}
      {{- with .Values.application.bearerIndex }}
      bearer-index:
        table-name: {{ .tableName | default "mcp-oauth-proxy-bearer-index" | quote }}
        implementation: {{ .implementation | default "enterprise" | quote }}
      {{- end }}
      {{- with .Values.application.oktaSessionCache }}
      upstream:
        okta:
          session-cache:
            enabled: {{ .enabled | default false }}
            min-remaining-seconds: {{ .minRemainingSeconds | default 120 }}
            l0-max-size: {{ .l0MaxSize | default 5000 }}
            l0-expire-after-write-seconds: {{ .l0ExpireAfterWriteSeconds | default 3600 }}
      {{- end }}
      {{- with .Values.application.userinfoClaimsCache }}
      userinfo:
        claims-cache:
          enabled: {{ .enabled | default false }}
          max-size: {{ .maxSize | default 10000 }}
          expire-after-write-seconds: {{ .expireAfterWriteSeconds | default 86400 }}
      {{- end }}
      cross-region-fallback:
        enabled: {{ .Values.application.crossRegionFallback.enabled | default false }}
        {{- if .Values.application.crossRegionFallback.enabled }}
        region: {{ .Values.application.crossRegionFallback.region | quote }}
        table-name: {{ .Values.application.crossRegionFallback.tableName | quote }}
        kms:
          key-id: {{ .Values.application.crossRegionFallback.kmsKeyId | quote }}
        sts:
          role-arn: {{ .Values.application.crossRegionFallback.stsRoleArn | quote }}
        {{- if .Values.application.crossRegionFallback.refreshTokenTableName }}
        refresh-token:
          table-name: {{ .Values.application.crossRegionFallback.refreshTokenTableName | quote }}
        {{- end }}
        {{- if .Values.application.crossRegionFallback.upstreamTokenTableName }}
        upstream-token:
          table-name: {{ .Values.application.crossRegionFallback.upstreamTokenTableName | quote }}
        {{- end }}
        {{- if .Values.application.crossRegionFallback.bearerIndexTableName }}
        bearer-index:
          table-name: {{ .Values.application.crossRegionFallback.bearerIndexTableName | quote }}
        {{- end }}
        refresh-token-and-upstream:
          enabled: {{ .Values.application.crossRegionFallback.refreshTokenAndUpstreamEnabled | default true }}
        {{- end }}
      secret:
        k8s:
          name: {{ .Values.application.k8s.secretName | quote }}
          namespace: {{ .Values.application.k8s.namespace | quote }}
      token-exchange:
        idp: {{ .Values.oidc.provider }}
        google-workspace:
          client-id: {{ .Values.oidc.googleWorkspace.clientId | quote }}
          client-secret-key: {{ .Values.oidc.googleWorkspace.clientSecretKey }}
        figma:
          client-id: {{ .Values.oidc.figma.clientId | quote }}
          client-secret-key: {{ .Values.oidc.figma.clientSecretKey | quote }}
        datadog:
          client-id: {{ .Values.oidc.datadog.clientId | quote }}
        linear:
          client-id: {{ .Values.oidc.linear.clientId | quote }}
          client-secret-key: {{ .Values.oidc.linear.clientSecretKey | default "linear-client-secret" | quote }}
        wisdomai:
          client-id: {{ .Values.oidc.wisdomAi.clientId | quote }}
          # Reserved for future confidential-client rollout (Descope E011002 fix). The WisdomAI
          # refresh path ignores this value today (public PKCE on the wire); set so SmallRye can
          # resolve a non-empty String at startup.
          client-secret-key: {{ .Values.oidc.wisdomAi.clientSecretKey | default "wisdomai-client-secret" | quote }}
        oracle-epm:
          client-id: {{ .Values.oidc.oracleEpm.clientId | quote }}
          # K8s secret key holding the Oracle IDCS confidential client_secret. Same key read by
          # OracleEpmUpstreamRefreshClient (canonical L2 path) and TokenExchangeServiceOracleEpmImpl
          # (legacy passthrough). Operator-tunable via .Values.oidc.oracleEpm.clientSecretKey.
          client-secret-key: {{ .Values.oidc.oracleEpm.clientSecretKey | default "oracle-epm-client-secret" | quote }}
        airtable:
          client-id: {{ .Values.oidc.airtable.clientId | quote }}
          # K8s secret key holding the Airtable confidential client_secret. Same key read by
          # AirtableUpstreamRefreshClient (canonical L2 path) and TokenExchangeServiceAirtableImpl
          # (legacy passthrough). Operator-tunable via .Values.oidc.airtable.clientSecretKey.
          client-secret-key: {{ .Values.oidc.airtable.clientSecretKey | default "airtable-client-secret" | quote }}
        athenz-token-exchange:
          audience: {{ .Values.application.tokenExchange.athenzTokenExchange.audience | default "sys.auth.gcp" | quote }}
        google-workforce:
          sts-token-url: {{ .Values.application.tokenExchange.googleWorkforce.stsTokenUrl | quote }}
          audience: {{ .Values.application.tokenExchange.googleWorkforce.audience | quote }}
          services:
            {{- range $name, $svc := .Values.application.tokenExchange.googleWorkforce.services }}
            {{- /* camelCase -> kebab-case: googleMonitoring -> google-monitoring, googleBigquery -> google-bigquery. Keys must use a single capital per word boundary. */ -}}
            {{- $kebab := regexReplaceAll "([a-z0-9])([A-Z])" $name "$1-$2" | lower }}
            {{ $kebab }}:
              scopes:
              {{- range $svc.scopes }}
                - {{ . | quote }}
              {{- end }}
              {{- with $svc.gcpRoleName }}
              gcp-role-name: {{ . | quote }}
              {{- end }}
            {{- end }}
        {{- $splunk := .Values.application.tokenExchange.splunk | default (dict) }}
        splunk:
          admin-token-secret-key: {{ $splunk.adminTokenSecretKey | default "splunk-api-stage" | quote }}
          mirror-user-prefix: {{ $splunk.mirrorUserPrefix | default "mcp." | quote }}
          splunk-token-audience: {{ $splunk.splunkTokenAudience | default "mcp" | quote }}
          token-expires-on: {{ $splunk.tokenExpiresOn | default "+1h" | quote }}
          cleanup-enabled: {{ $splunk.cleanupEnabled | default true }}
          {{- $allowedRoles := $splunk.allowedRoles | default (list "yahoo_user" "mcp_user") }}
          allowed-roles:
          {{- range $allowedRoles }}
            - {{ . | quote }}
          {{- end }}
        {{- $grafana := .Values.application.tokenExchange.grafana | default (dict) }}
        grafana:
          admin-token-secret-key: {{ $grafana.adminTokenSecretKey | default "grafana-api-prod" | quote }}
          token-name-prefix: {{ $grafana.tokenNamePrefix | default "mcp." | quote }}
          seconds-to-live: {{ $grafana.secondsToLive | default 3600 }}
          cleanup-enabled: {{ $grafana.cleanupEnabled | default true }}
        {{- $evaluate := .Values.application.tokenExchange.evaluate | default (dict) }}
        evaluate:
          audience: {{ $evaluate.audience | default "evaluateplus.k8s.evaluate-elide-production" | quote }}
          scopes:
            {{- range $s := ($evaluate.scopes | default (list "openid" "evaluateplus.k8s:role.evaluate-mcp-user")) }}
            - {{ $s | quote }}
            {{- end }}
        {{- $dbxSql := .Values.application.tokenExchange.databricksSql | default (dict) }}
        databricks-sql:
          workspace-host-template: {{ $dbxSql.workspaceHostTemplate | default "https://%s.cloud.databricks.com" | quote }}
          resource-path-prefix: {{ $dbxSql.resourcePathPrefix | default "/v1/databricks-sql/" | quote }}
          workspace-segment-pattern: {{ $dbxSql.workspaceSegmentPattern | default "^dbc-[a-zA-Z0-9.-]+$" | quote }}
          oauth-scope: {{ $dbxSql.oauthScope | default "sql" | quote }}
        {{- $dbxVs := .Values.application.tokenExchange.databricksVectorSearch | default (dict) }}
        databricks-vector-search:
          workspace-host-template: {{ $dbxVs.workspaceHostTemplate | default "https://%s.cloud.databricks.com" | quote }}
          resource-path-prefix: {{ $dbxVs.resourcePathPrefix | default "/v1/databricks-vector-search/" | quote }}
          workspace-segment-pattern: {{ $dbxVs.workspaceSegmentPattern | default "^dbc-[a-zA-Z0-9.-]+$" | quote }}
          oauth-scope: {{ $dbxVs.oauthScope | default "vector-search" | quote }}
        oktaServiceTypeApp:
          auth-server-url: {{ .Values.application.oktaServiceTypeApp.endpoint | quote }}
          client-id: {{ .Values.application.oktaServiceTypeApp.clientId | quote }}
          client-secret-key: {{ .Values.application.oktaServiceTypeApp.clientSecretKey | quote }}
          audience: {{ .Values.application.oktaServiceTypeApp.audience | quote }}
        remote-servers:
          endpoints:
            - name: athenz
              endpoint: {{ .Values.application.zts.endpoint | quote }}
              username-claim: {{ .Values.application.zts.claim | quote }}
            - name: okta
              endpoint: {{ .Values.oidc.authServerUrl | quote }}
              username-claim: {{ .Values.oidc.claim | quote }}
            - name: atlassian
              endpoint: {{ .Values.oidc.atlassian.endpoint | quote }}
              username-claim: {{ .Values.oidc.atlassian.claim | quote }}
            - name: github
              endpoint: {{ .Values.oidc.github.endpoint | quote }}
              username-claim: {{ .Values.oidc.github.claim | quote }}
            {{- range .Values.googleWorkspaceServices }}
            - name: {{ .name }}
              endpoint: {{ $.Values.oidc.googleWorkspace.endpoint | quote }}
              username-claim: {{ $.Values.oidc.googleWorkspace.claim | quote }}
            {{- end }}
            - name: embrace
              endpoint: {{ .Values.oidc.embrace.authorizationUrl | quote }}
              username-claim: {{ .Values.oidc.embrace.claim | quote }}
            - name: splunk
              endpoint: {{ $splunk.mgmtEndpoint | default "" | quote }}
              username-claim: {{ $splunk.usernameClaim | default "short_id" | quote }}
            - name: grafana
              endpoint: {{ $grafana.mgmtEndpoint | default "https://yahooinc.grafana.net" | quote }}
              username-claim: {{ $grafana.usernameClaim | default "short_id" | quote }}
              service-account-id: {{ $grafana.serviceAccountId | default "" | quote }}
            - name: evaluate
              endpoint: {{ $evaluate.mcpEndpoint | default "https://evaluate-elide-api.data.yahoo.com/" | quote }}
              username-claim: {{ $evaluate.usernameClaim | default "short_id" | quote }}
            - name: slack
              endpoint: {{ .Values.oidc.slack.endpoint | quote }}
              username-claim: {{ .Values.oidc.slack.claim | quote }}
            - name: figma
              endpoint: {{ .Values.oidc.figma.endpoint | quote }}
              username-claim: {{ .Values.oidc.figma.claim | quote }}
            - name: datadog
              endpoint: {{ .Values.oidc.datadog.endpoint | quote }}
              username-claim: {{ .Values.oidc.datadog.claim | quote }}
            - name: linear
              endpoint: {{ .Values.oidc.linear.endpoint | quote }}
              username-claim: {{ .Values.oidc.linear.claim | quote }}
            - name: wisdomai
              endpoint: {{ .Values.oidc.wisdomAi.endpoint | quote }}
              username-claim: {{ .Values.oidc.wisdomAi.claim | quote }}
            - name: oracle-epm
              endpoint: {{ .Values.oidc.oracleEpm.endpoint | quote }}
              username-claim: {{ .Values.oidc.oracleEpm.claim | quote }}
            - name: airtable
              endpoint: {{ .Values.oidc.airtable.endpoint | quote }}
              username-claim: {{ .Values.oidc.airtable.claim | quote }}
      resources:
        resource-mapping:
        {{- with .Values.application.resourceMapping -}}
          {{ toYaml . | nindent 10 }}
        {{- end }}

    mop:
      authorize-error:
        iiq-url: {{ .Values.application.authorizeError.iiqUrl | default "https://yo/iiq" | quote }}
        support-channel: {{ .Values.application.authorizeError.supportChannel | default "#mcp-help" | quote }}
