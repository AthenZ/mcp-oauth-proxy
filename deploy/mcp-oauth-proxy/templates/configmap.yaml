apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mcp-oauth-proxy.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{ include "mcp-oauth-proxy.labels" . | nindent 4 }}
data:
  application.yaml: |
    quarkus:
      http:
        ssl-port: {{ .Values.service.targetPort }}
        insecure-requests: disabled
        access-log:
          enabled: true
          pattern: "%h %t \"%r\" %s %b"
          exclude-pattern: "/q/.*"
        tls-configuration-name: enterprise
        ssl:
          client-auth: request
        auth:
          permission:
            health:
              paths: "/q/health/*"
              policy: "permit"
            embrace-internal-userinfo:
              paths: "/internal/embrace/oauth-userinfo"
              policy: permit
            atlassian-mcp:
              paths: "/atlassian-mcp/*"
              policy: authenticated
            atlassian:
              paths: "/atlassian/*"
              policy: authenticated
            github:
              paths: "/github/*"
              policy: authenticated
            {{- range .Values.googleWorkspaceServices }}
            {{ .name }}:
              paths: "/{{ .name }}/*"
              policy: authenticated
            {{- end }}
            slack:
              paths: "/slack/*"
              policy: authenticated
            embrace:
              paths: "/embrace/*"
              policy: authenticated
        cors:
          enabled: true
          origins: http://localhost:6274 # allow mcp inspector
          methods: GET,PUT,POST

      tls:
        protocols: {{ .Values.application.tls.protocols | quote }}
        cipher-suites: {{ .Values.application.tls.cipherSuites | quote }}
        reload-period: {{ .Values.application.tls.reloadPeriod | quote }}
{{- if (.Values.oidc.embrace.tlsInsecureClient | default false) }}
        embrace-insecure-client:
          trust-all: true
          hostname-verification-algorithm: NONE
{{- end }}

      log:
        console:
          format: "%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n"
        level: INFO
        category:
          "io.quarkus.oidc.runtime":
            level: INFO
            min-level: INFO

      oidc:
        auth-server-url: {{ .Values.oidc.authServerUrl | quote }}
        client-id: {{ .Values.oidc.clientId | quote }}
        credentials:
          client-secret:
            provider:
              key: {{ .Values.oidc.clientSecretKey }}
            method: post
        authentication:
          scopes:
          {{- range .Values.oidc.scopes }}
            - {{ . | quote }}
          {{- end }}
          redirect-path: /authorize/callback
          restore-path-after-redirect: true
        application-type: web-app
        atlassian:
          auth-server-url: {{ .Values.oidc.atlassian.endpoint | quote }}
          client-id: {{ .Values.oidc.atlassian.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.atlassian.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range .Values.oidc.atlassian.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /atlassian/authorize/callback
            restore-path-after-redirect: true
            extra-params:
              audience: "api.atlassian.com"
              prompt: "consent"
            add-openid-scope: false
            id-token-required: false
          application-type: web-app
          token-state-manager:
            strategy: keep-all-tokens
          user-info-path: {{ .Values.oidc.atlassian.userInfoPath | quote }}
          token:
            issuer: any
        github:
          provider: github
          client-id: {{ .Values.oidc.github.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.github.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range .Values.oidc.github.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /github/authorize/callback
            restore-path-after-redirect: true
        {{- range .Values.googleWorkspaceServices }}
        {{ .name }}:
          provider: google
          client-id: {{ $.Values.oidc.googleWorkspace.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ $.Values.oidc.googleWorkspace.clientSecretKey }}
              method: post
          authentication:
            scopes:
            {{- range (index $.Values.oidc .scopesKey).scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /{{ .name }}/authorize/callback
            restore-path-after-redirect: true
            extra-params:
              access_type: "offline"
        {{- end }}
        slack:
          auth-server-url: "https://slack.com"
          discovery-enabled: false
          authorization-path: "/oauth/v2/authorize"
          token-path: "/api/oauth.v2.user.access"
          user-info-path: "https://slack.com/api/auth.test"
          client-id: {{ .Values.oidc.slack.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.slack.clientSecretKey }}
              method: post
          authentication:
            scopes: []
            redirect-path: /slack/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
            extra-params:
              user_scope: {{ .Values.oidc.slack.userScopes | quote }}
              team: {{ .Values.oidc.slack.team | quote }}
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: any
        embrace:
{{- if (.Values.oidc.embrace.tlsInsecureClient | default false) }}
          tls:
            tls-configuration-name: embrace-insecure-client
{{- end }}
          discovery-enabled: false
          auth-server-url: {{ .Values.oidc.embrace.authServerUrl | quote }}
          authorization-path: {{ .Values.oidc.embrace.authorizationUrl | quote }}
          token-path: {{ .Values.oidc.embrace.tokenPath | quote }}
          jwks-path: {{ .Values.oidc.embrace.jwksPath | quote }}
          {{- if .Values.oidc.embrace.userInfoPath }}
          user-info-path: {{ .Values.oidc.embrace.userInfoPath | quote }}
          {{- else }}
          {{- $embraceUiBase := .Values.oidc.embrace.syntheticUserInfoBaseUrl | default (printf "https://%s" .Values.application.host) }}
          user-info-path: {{ printf "%s/internal/embrace/oauth-userinfo" $embraceUiBase | quote }}
          {{- end }}
          client-id: {{ .Values.oidc.embrace.clientId | quote }}
          credentials:
            client-secret:
              provider:
                key: {{ .Values.oidc.embrace.clientSecretKey | quote }}
              method: {{ .Values.oidc.embrace.clientSecretMethod | default "basic" | quote }}
          authentication:
            scopes:
            {{- range .Values.oidc.embrace.scopes }}
              - {{ . | quote }}
            {{- end }}
            redirect-path: /embrace/authorize/callback
            restore-path-after-redirect: true
            add-openid-scope: false
            id-token-required: false
            user-info-required: true
            verify-access-token: false
          application-type: web-app
          allow-user-info-cache: false
          cache-user-info-in-idtoken: true
          token-state-manager:
            strategy: keep-all-tokens
          token:
            issuer: {{ .Values.oidc.embrace.tokenIssuer | quote }}
            verify-access-token-with-user-info: false

      otel:
        resource:
          attributes: service.name={{ include "mcp-oauth-proxy.serviceVersion" . }},service.instance.id=${POD_NAME},cloud.account.id=${CLOUD_ACCOUNT_ID}
        exporter:
          otlp:
            protocol: {{ .Values.application.otel.protocol }}
            endpoint: {{ .Values.application.otel.endpoint }}
            trust-cert:
              certs: {{ .Values.application.otel.trustStorePath | quote }}

      cache:
        caffeine:
          token-cache:
            initial-capacity: 10
            expire-after-write: PT30M
            maximum-size: 100
          code-cache:
            initial-capacity: 10
            expire-after-write: PT10M
            maximum-size: 100

    server:
      host: {{ .Values.application.host | quote }}
      {{- with .Values.application.allowedRedirectUriPrefixes }}
      allowed-redirect-uri-prefixes:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.application.allowedRedirectUriExact }}
      allowed-redirect-uri-exact:
        {{- range . }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
      tls:
        certificate:
          path: {{ .Values.application.tls.certPath | quote }}
        private-key:
          path: {{ .Values.application.tls.keyPath | quote }}
        refresh:
          interval: {{ .Values.application.tls.refreshDuration | quote }}
        truststore:
          path: {{ .Values.application.tls.trustStorePath | quote }}
      athenz:
        cert-file: {{ .Values.athenz.certFilePath | quote }}
        key-file: {{ .Values.athenz.keyFilePath | quote }}
        truststore-file: {{ .Values.athenz.trustStorePath | quote }}
        user-prefix: {{ .Values.athenz.userPrefix | quote }}
        zms:
          endpoint: {{ .Values.application.zms.endpoint | quote }}
        zts:
          endpoint: {{ .Values.application.zts.endpoint | quote }}
        register:
          domain: {{ .Values.application.register.domain | quote }}
          role: {{ .Values.application.register.role | quote }}
        resource-authorization: false
        authorization-action: {{ .Values.application.authorization.action | quote }}
        authorization-domain: {{ .Values.application.authorization.domain | quote }}
      token-store:
        implementation: enterprise
        expiry: {{ .Values.application.tokenStore.expiry }}
        aws:
          dynamodb:
            table-name: {{ .Values.application.aws.dynamoDbTable | quote }}
          kms:
            key-id: {{ .Values.application.aws.kmsKeyId | quote }}
          sts:
            role-arn: {{ .Values.application.aws.stsRoleArn | quote }}
      refresh-token:
        table-name: {{ .Values.application.refreshToken.tableName | quote }}
        expiry-seconds: {{ .Values.application.refreshToken.expirySeconds }}
        ttl-buffer-days: {{ .Values.application.refreshToken.ttlBufferDays }}
      refresh-lock:
        table-name: {{ .Values.application.refreshLock.tableName | quote }}
        ttl-seconds: {{ .Values.application.refreshLock.ttlSeconds }}
        {{- if .Values.application.refreshLock.instanceId }}
        instance-id: {{ .Values.application.refreshLock.instanceId | quote }}
        {{- end }}
        max-retries: {{ .Values.application.refreshLock.maxRetries }}
        initial-backoff-ms: {{ .Values.application.refreshLock.initialBackoffMs }}
      upstream-token:
        table-name: {{ .Values.application.upstreamToken.tableName | quote }}
        expiry-seconds: {{ .Values.application.upstreamToken.expirySeconds }}
        ttl-buffer-days: {{ .Values.application.upstreamToken.ttlBufferDays }}
      cross-region-fallback:
        enabled: {{ .Values.application.crossRegionFallback.enabled | default false }}
        {{- if .Values.application.crossRegionFallback.enabled }}
        region: {{ .Values.application.crossRegionFallback.region | quote }}
        table-name: {{ .Values.application.crossRegionFallback.tableName | quote }}
        kms:
          key-id: {{ .Values.application.crossRegionFallback.kmsKeyId | quote }}
        sts:
          role-arn: {{ .Values.application.crossRegionFallback.stsRoleArn | quote }}
        {{- if .Values.application.crossRegionFallback.refreshTokenTableName }}
        refresh-token:
          table-name: {{ .Values.application.crossRegionFallback.refreshTokenTableName | quote }}
        {{- end }}
        {{- if .Values.application.crossRegionFallback.upstreamTokenTableName }}
        upstream-token:
          table-name: {{ .Values.application.crossRegionFallback.upstreamTokenTableName | quote }}
        {{- end }}
        {{- end }}
      secret:
        k8s:
          name: {{ .Values.application.k8s.secretName | quote }}
          namespace: {{ .Values.application.k8s.namespace | quote }}
      token-exchange:
        idp: {{ .Values.oidc.provider }}
        google-workspace:
          client-id: {{ .Values.oidc.googleWorkspace.clientId | quote }}
          client-secret-key: {{ .Values.oidc.googleWorkspace.clientSecretKey }}
        athenz-token-exchange:
          audience: {{ .Values.application.tokenExchange.athenzTokenExchange.audience | default "sys.auth.gcp" | quote }}
        google-workforce:
          sts-token-url: {{ .Values.application.tokenExchange.googleWorkforce.stsTokenUrl | quote }}
          audience: {{ .Values.application.tokenExchange.googleWorkforce.audience | quote }}
          services:
            {{- range $name, $svc := .Values.application.tokenExchange.googleWorkforce.services }}
            {{- /* camelCase -> kebab-case: googleMonitoring -> google-monitoring, googleBigquery -> google-bigquery. Keys must use a single capital per word boundary. */ -}}
            {{- $kebab := regexReplaceAll "([a-z0-9])([A-Z])" $name "$1-$2" | lower }}
            {{ $kebab }}:
              scopes:
              {{- range $svc.scopes }}
                - {{ . | quote }}
              {{- end }}
              {{- with $svc.gcpRoleName }}
              gcp-role-name: {{ . | quote }}
              {{- end }}
            {{- end }}
        {{- $splunk := .Values.application.tokenExchange.splunk | default (dict) }}
        splunk:
          admin-token-secret-key: {{ $splunk.adminTokenSecretKey | default "splunk-api-stage" | quote }}
          mirror-user-prefix: {{ $splunk.mirrorUserPrefix | default "mcp." | quote }}
          splunk-token-audience: {{ $splunk.splunkTokenAudience | default "mcp" | quote }}
          token-expires-on: {{ $splunk.tokenExpiresOn | default "+1h" | quote }}
          cleanup-enabled: {{ $splunk.cleanupEnabled | default true }}
          {{- $allowedRoles := $splunk.allowedRoles | default (list "yahoo_user" "mcp_user") }}
          allowed-roles:
          {{- range $allowedRoles }}
            - {{ . | quote }}
          {{- end }}
        {{- $grafana := .Values.application.tokenExchange.grafana | default (dict) }}
        grafana:
          admin-token-secret-key: {{ $grafana.adminTokenSecretKey | default "grafana-api-prod" | quote }}
          token-name-prefix: {{ $grafana.tokenNamePrefix | default "mcp." | quote }}
          seconds-to-live: {{ $grafana.secondsToLive | default 3600 }}
          cleanup-enabled: {{ $grafana.cleanupEnabled | default true }}
        {{- $evaluate := .Values.application.tokenExchange.evaluate | default (dict) }}
        evaluate:
          audience: {{ $evaluate.audience | default "evaluateplus.k8s.evaluate-elide-production" | quote }}
          scopes:
            {{- range $s := ($evaluate.scopes | default (list "openid" "evaluateplus.k8s:role.evaluate-mcp-user")) }}
            - {{ $s | quote }}
            {{- end }}
        {{- $dbxSql := .Values.application.tokenExchange.databricksSql | default (dict) }}
        databricks-sql:
          workspace-host-template: {{ $dbxSql.workspaceHostTemplate | default "https://%s.cloud.databricks.com" | quote }}
          resource-path-prefix: {{ $dbxSql.resourcePathPrefix | default "/v1/databricks-sql/" | quote }}
          workspace-segment-pattern: {{ $dbxSql.workspaceSegmentPattern | default "^dbc-[a-zA-Z0-9.-]+$" | quote }}
          oauth-scope: {{ $dbxSql.oauthScope | default "sql" | quote }}
        {{- $dbxVs := .Values.application.tokenExchange.databricksVectorSearch | default (dict) }}
        databricks-vector-search:
          workspace-host-template: {{ $dbxVs.workspaceHostTemplate | default "https://%s.cloud.databricks.com" | quote }}
          resource-path-prefix: {{ $dbxVs.resourcePathPrefix | default "/v1/databricks-vector-search/" | quote }}
          workspace-segment-pattern: {{ $dbxVs.workspaceSegmentPattern | default "^dbc-[a-zA-Z0-9.-]+$" | quote }}
          oauth-scope: {{ $dbxVs.oauthScope | default "vector-search" | quote }}
        oktaServiceTypeApp:
          auth-server-url: {{ .Values.application.oktaServiceTypeApp.endpoint | quote }}
          client-id: {{ .Values.application.oktaServiceTypeApp.clientId | quote }}
          client-secret-key: {{ .Values.application.oktaServiceTypeApp.clientSecretKey | quote }}
          audience: {{ .Values.application.oktaServiceTypeApp.audience | quote }}
        remote-servers:
          endpoints:
            - name: athenz
              endpoint: {{ .Values.application.zts.endpoint | quote }}
              username-claim: {{ .Values.application.zts.claim | quote }}
            - name: okta
              endpoint: {{ .Values.oidc.authServerUrl | quote }}
              username-claim: {{ .Values.oidc.claim | quote }}
            - name: atlassian
              endpoint: {{ .Values.oidc.atlassian.endpoint | quote }}
              username-claim: {{ .Values.oidc.atlassian.claim | quote }}
            - name: github
              endpoint: {{ .Values.oidc.github.endpoint | quote }}
              username-claim: {{ .Values.oidc.github.claim | quote }}
            {{- range .Values.googleWorkspaceServices }}
            - name: {{ .name }}
              endpoint: {{ $.Values.oidc.googleWorkspace.endpoint | quote }}
              username-claim: {{ $.Values.oidc.googleWorkspace.claim | quote }}
            {{- end }}
            - name: embrace
              endpoint: {{ .Values.oidc.embrace.authorizationUrl | quote }}
              username-claim: {{ .Values.oidc.embrace.claim | quote }}
            - name: splunk
              endpoint: {{ $splunk.mgmtEndpoint | default "" | quote }}
              username-claim: {{ $splunk.usernameClaim | default "short_id" | quote }}
            - name: grafana
              endpoint: {{ $grafana.mgmtEndpoint | default "https://yahooinc.grafana.net" | quote }}
              username-claim: {{ $grafana.usernameClaim | default "short_id" | quote }}
              service-account-id: {{ $grafana.serviceAccountId | default "" | quote }}
            - name: evaluate
              endpoint: {{ $evaluate.mcpEndpoint | default "https://evaluate-elide-api.data.yahoo.com/" | quote }}
              username-claim: {{ $evaluate.usernameClaim | default "short_id" | quote }}
            - name: slack
              endpoint: {{ .Values.oidc.slack.endpoint | quote }}
              username-claim: {{ .Values.oidc.slack.claim | quote }}
      resources:
        resource-mapping:
        {{- with .Values.application.resourceMapping -}}
          {{ toYaml . | nindent 10 }}
        {{- end -}}
