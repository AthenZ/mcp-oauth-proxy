# Default values for mcp-oauth-proxy
replicaCount: 1

image:
  repository:
  pullPolicy: IfNotPresent
  tag:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
forceNamespace: ""

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn:
  name:

podAnnotations: {}

podSecurityContext:
  fsGroup:
  runAsNonRoot: true
  runAsUser:

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser:

service:
  type: LoadBalancer
  port:
  targetPort:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: HTTPS

resources:
  limits:
    cpu:
    memory:
  requests:
    cpu:
    memory:

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

otel:
  enabled: false
  collector:
    endpoint: http://otel-collector:4317
  instrumentation:
    enabled: false
    java:
      disabledResourceProviders: ""
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
    resource:
      providers:
        aws:
          enabled: "true"
    trustStore: ""
    runtime:
      telemetry:
        enabled: false
        experimental:
          enabled: false
        java17:
          enabled: false
          allEnabled: false
  exporter:
    mtls:
      enabled: false

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - mcp-oauth-proxy
        topologyKey: kubernetes.io/hostname

athenz:
  domain:
  service:
  certFilePath:
  keyFilePath:
  trustStorePath:
  userPrefix:
  fsGroup:

application:
  environment:
  cloudAccountId:
  authTokenSubject:
  otel:
    protocol:
    endpoint:
    trustStorePath:
  logging:
    level:
  host:
  zms:
    endpoint:
  zts:
    endpoint:
    claim:
  register:
    domain:
    role:
  authorization:
    action:
    domain:
  tokenStore:
    expiry:
  refreshToken:
    tableName: mcp-oauth-proxy-refresh-tokens
    expirySeconds: 7776000
    ttlBufferDays: 7
  refreshLock:
    tableName: mcp-oauth-proxy-refresh-locks
    ttlSeconds: 8
    instanceId: ""
    maxRetries: 5
    initialBackoffMs: 50
  upstreamToken:
    tableName: mcp-oauth-proxy-upstream-tokens
    expirySeconds: 7776000
    ttlBufferDays: 7
  crossRegionFallback:
    enabled: false
    region: ""
    tableName: ""
    kmsKeyId: ""
    stsRoleArn: ""
  aws:
    dynamoDbTable:
    kmsKeyId:
  k8s:
    secretName:
    namespace:
  tls:
    reloadPeriod:
    protocols:
    cipherSuites:
    certPath:
    keyPath:
    refreshDuration:
    volume:
      secretName:
    trustStorePath:
  resourceMapping:
    - uri:
      domain:
      scopes:
      token:
        idp:
        as:
        jag:
          enabled:
          issuer:

oidc:
  authServerUrl:
  claim:
  clientId:
  clientSecretKey:
  scopes:
    - offline_access
  provider:
  atlassian:
    clientId:
    userInfoPath:
    endpoint: "https://auth.atlassian.com"
    claim:
    clientSecretKey:
    scopes:
      - read:me
      - read:account
      - offline_access
  github:
    endpoint: "https://github.com/login/oauth"
    clientId:
    claim:
    clientSecretKey:
    scopes:
      - offline_access
  google:
    endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
    clientId:
    claim:
    clientSecretKey:
    scopes:
      - openid
  embrace:
    authServerUrl: "https://dash-api.embrace.io"
    authorizationUrl: "https://dash.embrace.io/oauth/authorize"
    tokenPath: "/oauth/token"
    jwksPath: "/.well-known/jwks.json"
    # Public HTTPS base for MoP (no path). Defaults to https://application.host if empty.
    syntheticUserInfoBaseUrl: ""
    # Quarkus OidcProvider: "any" skips iss on self-signed internal ID tokens (id-token-required=false + synthetic UserInfo).
    tokenIssuer: "any"
    clientId:
    claim: sub
    clientSecretKey: embrace-client-secret
    clientSecretMethod: basic
    scopes:
      - mcp:read
      - mcp:write
      - mcp:tools:call

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /q/health/live
      port:
      scheme: HTTPS
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /q/health/ready
      port:
      scheme: HTTPS
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
