# Default values for mcp-oauth-proxy
replicaCount: 1

image:
  repository:
  pullPolicy: IfNotPresent
  tag:

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
forceNamespace: ""

serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn:
  name:

podAnnotations: {}

podSecurityContext:
  fsGroup:
  runAsNonRoot: true
  runAsUser:

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser:

service:
  type: LoadBalancer
  port:
  targetPort:
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: HTTPS

resources:
  limits:
    cpu:
    memory:
  requests:
    cpu:
    memory:

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

nodeSelector: {}

tolerations: []

otel:
  enabled: false
  collector:
    endpoint: http://otel-collector:4317
  instrumentation:
    enabled: false
    java:
      disabledResourceProviders: ""
      image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:latest
    resource:
      providers:
        aws:
          enabled: "true"
    trustStore: ""
    runtime:
      telemetry:
        enabled: false
        experimental:
          enabled: false
        java17:
          enabled: false
          allEnabled: false
  exporter:
    mtls:
      enabled: false

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - mcp-oauth-proxy
        topologyKey: kubernetes.io/hostname

athenz:
  domain:
  service:
  certFilePath:
  keyFilePath:
  trustStorePath:
  userPrefix:
  fsGroup:

application:
  environment:
  cloudAccountId:
  authTokenSubject:
  otel:
    protocol:
    endpoint:
    trustStorePath:
  logging:
    level:
  host:
  allowedRedirectUriPrefixes:
    - http://localhost
    - https://localhost
    - http://127.0.0.1
    - https://127.0.0.1
    - cursor://anysphere.cursor-
    - https://vscode.dev
    - https://vscode.dev/
  allowedRedirectUriExact:
    - https://claude.ai/api/mcp/auth_callback
    - https://claude.com/api/mcp/auth_callback
    - https://insiders.vscode.dev/redirect
    - https://cursor.com/api/auth/mcp/oauth/callback
    - https://www.cursor.com/agents/mcp/oauth/callback
  zms:
    endpoint:
  zts:
    endpoint:
    claim:
  register:
    domain:
    role:
  authorization:
    action:
    domain:
  tokenStore:
    expiry:
  refreshToken:
    tableName: mcp-oauth-proxy-refresh-tokens
    expirySeconds: 7776000
    ttlBufferDays: 7
    # Layer 2 — token-age grace. Tolerate ROTATED-status replays whose rotated_at is within this
    # many seconds. Serves the duplicate caller from the family successor instead of revoking.
    # 7200 = 2h. Sliding-grace post-Paranoids target: 172800 (48h).
    rotatedGraceSeconds: 7200
    # Layer 2 — family-idle grace gate (defense-in-depth, opt-in). Set > 0 to require recent
    # family activity in addition to the token-age check; 0 disables the gate.
    # Default 0 (disabled) for the 2h ship. Sliding-grace post-Paranoids target: 172800 (48h)
    # to pair with rotatedGraceSeconds also at 172800.
    familyIdleGraceSeconds: 0
    # Layer 1 (per-RT singleflight): per-pod in-flight result cache TTL.
    inflightCacheSeconds: 30
    # Per-RT distributed-lock TTL written into mcp-oauth-proxy-refresh-locks. Sized to comfortably
    # outlast a worst-case rotate() (read + validate + TransactWrite under DDB retry pressure).
    # Does NOT cover the upstream Okta refresh; that runs after the lock is released.
    inflightLockTtlSeconds: 30
    # 12 retries with 100ms initial backoff (×2, capped at 2000ms) ≈ 17s worst-case wait.
    inflightLockMaxRetries: 12
    inflightLockInitialBackoffMs: 100
  refreshLock:
    tableName: mcp-oauth-proxy-refresh-locks
    ttlSeconds: 8
    instanceId: ""
    maxRetries: 5
    initialBackoffMs: 50
  upstreamToken:
    tableName: mcp-oauth-proxy-upstream-tokens
    expirySecondsDefault: "2592000"
    expirySecondsByProvider:
      okta: "86400"                  # 24h — paranoids tier; Okta RT rotates every refresh
      google-workspace: "15552000"   # 6 months — applies to all Google Workspace MCPs
      figma: "7776000"               # 90 days — matches Figma's documented access-token lifetime
      datadog: "15552000"            # 6 months — Datadog RT does not expire upstream; capped to bound L2 row TTL
      linear: "15552000"             # 6 months — Linear RT lifetime is unbounded; capped to bound L2 row TTL
      oracle-epm: "2592000"          # 30 days — matches global default; Oracle IDCS RT TTL is operator-tunable
    ttlBufferDays: 3
    # How long REVOKED L2 rows are retained before TTL eviction. Sized so an operator can
    # still inspect a recently-revoked row when triaging a refresh-token-revoked event.
    revokedRetentionDays: 14
    # Path E (reuse-within-grace): when a second client acquires the L2 lock within this many
    # seconds of another client rotating the upstream RT, AND the staged AT still has at least
    # l2AtReuseMinRemainingSeconds left, the second client reuses the staged AT instead of
    # calling the upstream IdP. Lowering this reduces the chance of two near-simultaneous
    # clients sharing an AT; raising it amortizes more clients onto a single upstream call.
    l2AtReuseGraceSeconds: 30
    # Path E floor: minimum remaining AT TTL required to reuse a staged AT. Defends against
    # handing out an AT that's about to expire mid-flight even if it was rotated within the
    # grace window above.
    l2AtReuseMinRemainingSeconds: 60
    # When the local L2 row is missing or stale relative to the peer region (cross-region
    # fallback enabled), wait this many ms once for DynamoDB Global Tables replication to land
    # locally before giving up and returning a transient error. Avoids turning sub-second
    # replication lag into a forced re-authentication.
    replicationWaitMillis: 750
  bearerIndex:
    tableName: mcp-oauth-proxy-bearer-index
    implementation: enterprise
  oktaSessionCache:
    enabled: false
    minRemainingSeconds: 120
    l0MaxSize: 5000
    l0ExpireAfterWriteSeconds: 3600
  # Per-pod strict-write-once cache of stripped /userinfo claim maps keyed by Athenz-stripped
  # userId. When enabled and a bearer-index hit yields a userId already in the cache,
  # /userinfo serves cached claims and skips the Okta resolution flow entirely (no
  # tryRefreshOktaToken call). Stabilizes /userinfo against Okta upstream outages at the cost
  # of up to ttl staleness. See UserInfoClaimsCacheConfig.
  userinfoClaimsCache:
    enabled: false
    maxSize: 10000
    expireAfterWriteSeconds: 86400
  crossRegionFallback:
    enabled: false
    region: ""
    tableName: ""
    kmsKeyId: ""
    stsRoleArn: ""
    refreshTokenTableName: ""
    upstreamTokenTableName: ""
    bearerIndexTableName: ""
    refreshTokenAndUpstreamEnabled: true
  aws:
    dynamoDbTable:
    kmsKeyId:
  k8s:
    secretName:
    namespace:
  tls:
    reloadPeriod:
    protocols:
    cipherSuites:
    certPath:
    keyPath:
    refreshDuration:
    volume:
      secretName:
    trustStorePath:
  resourceMapping:
    - uri:
      domain:
      scopes:
      token:
        idp:
        as:
        jag:
          enabled:
          issuer:
  authorizeError:
    iiqUrl: "https://yo/iiq"
    supportChannel: "#mcp-oauth-proxy-users"

googleWorkspaceServices:
  - name: google-drive
    scopesKey: googleDrive
  - name: google-docs
    scopesKey: googleDocs
  - name: google-sheets
    scopesKey: googleSheets
  - name: google-slides
    scopesKey: googleSlides
  - name: google-gmail
    scopesKey: googleGmail
  - name: google-calendar
    scopesKey: googleCalendar
  - name: google-tasks
    scopesKey: googleTasks
  - name: google-chat
    scopesKey: googleChat
  - name: google-forms
    scopesKey: googleForms
  - name: google-keep
    scopesKey: googleKeep
  - name: google-meet
    scopesKey: googleMeet
  - name: google-cloud-platform
    scopesKey: googleCloudPlatform

oidc:
  authServerUrl:
  claim:
  clientId:
  clientSecretKey:
  scopes:
    - offline_access
  provider:
  atlassian:
    clientId:
    userInfoPath:
    endpoint: "https://auth.atlassian.com"
    claim:
    clientSecretKey:
    scopes:
      - read:me
      - read:account
      - offline_access
  github:
    endpoint: "https://github.com/login/oauth"
    clientId:
    claim:
    clientSecretKey:
    scopes:
      - offline_access
  googleWorkspace:
    endpoint: "https://accounts.google.com/o/oauth2/v2/auth"
    clientId:
    claim:
    clientSecretKey:
  googleDrive:
    scopes:
      - openid
  googleDocs:
    scopes:
      - openid
  googleSheets:
    scopes:
      - openid
  googleSlides:
    scopes:
      - openid
  googleGmail:
    scopes:
      - openid
  googleCalendar:
    scopes:
      - openid
  googleTasks:
    scopes:
      - openid
  googleChat:
    scopes:
      - openid
  googleForms:
    scopes:
      - openid
  googleKeep:
    scopes:
      - openid
  googleMeet:
    scopes:
      - openid
  googleCloudPlatform:
    scopes:
      - openid
  slack:
    endpoint: "https://slack.com/oauth/v2/authorize"
    clientId:
    claim: user_id
    clientSecretKey: slack-client-secret
    team:
    userScopes: "users:read.email,users:read,search:read.users,search:read.public,search:read.private,groups:history,channels:history,canvases:read"
  figma:
    endpoint: "https://www.figma.com/oauth/mcp"
    clientId:
    # /v1/me returns { id, email, handle, ... }; BaseResource.getUsername strips @domain for email claims.
    claim: email
    clientSecretKey: figma-client-secret
    scopes:
      - mcp:connect
      - current_user:read
  datadog:
    # remote-servers.endpoints[name=datadog].endpoint — used by ConfigService when resolving the
    # OIDC remote-server config; the actual upstream OAuth/AS URLs are pinned in configmap.yaml.
    endpoint: "https://mcp.datadoghq.com/v1/mcp"
    # public PKCE client; DCR returns only client_id (no client_secret).
    clientId:
    # Datadog has no flat OIDC userinfo. The synthetic /internal/datadog/oauth-userinfo proxy
    # flattens app.datadoghq.com/api/v2/current_user (data.attributes.email) to top-level claims;
    # BaseResource.getUsername strips @domain for email claims.
    claim: email
    # RFC 8707 resource indicator required by Datadog on /authorize. Pinned to the MCP server URL.
    resource: "https://mcp.datadoghq.com/v1/mcp"
    # When non-empty, used verbatim as quarkus.oidc.datadog.user-info-path. When empty,
    # configmap.yaml defaults to https://<application.host>/internal/datadog/oauth-userinfo
    # (mirrors embrace.userInfoPath).
    userInfoPath: ""
    # Public HTTPS base for MoP (no path). Used only when userInfoPath is empty. Defaults to
    # https://<application.host>.
    syntheticUserInfoBaseUrl: ""
    # Set to true ONLY when userInfoPath points at the in-pod loopback
    # (https://localhost:<ssl-port>/...). Egress policies in stage/prod block the pod from
    # reaching its own public hostname, so synthetic UserInfo must round-trip via loopback,
    # which uses a self-signed cert that the JVM trust store does not accept. When true, the
    # configmap renders a `datadog-insecure-client` named TLS config (trust-all + skip
    # hostname verification) and binds it to quarkus.oidc.datadog.tls.tls-configuration-name.
    tlsInsecureClient: false
    # Datadog MCP requires mcp_read + mcp_write to grant the issued AT access to the MCP
    # resource and to app.datadoghq.com/api/v2/current_user (proxied by the synthetic userinfo
    # endpoint). Override per env if Datadog later adds finer-grained scopes; defaults below
    # match the Datadog MCP "Read+Write" preset.
    scopes:
      - mcp_read
      - mcp_write
  linear:
    # remote-servers.endpoints[name=linear].endpoint — used by ConfigService when resolving the
    # OIDC remote-server config; the actual upstream OAuth/AS URLs are pinned in configmap.yaml.
    endpoint: "https://api.linear.app"
    # Public PKCE client; same client_id is used in local, stage, and prod per Linear OAuth setup.
    clientId:
    # Linear has no flat OIDC userinfo. The synthetic /internal/linear/oauth-userinfo proxy POSTs
    # `query { viewer { id name email } }` to https://api.linear.app/graphql and flattens to
    # top-level email/id/name/sub claims; BaseResource.getUsername strips @domain for email.
    claim: email
    # Reserved for future confidential client. Today Linear is public PKCE and the refresh
    # path ignores this value on the wire; the placeholder secret key is set so SmallRye can
    # resolve a non-empty String at startup.
    clientSecretKey: "linear-client-secret"
    # Linear-required scope string. Comma-separated (Linear's format) — passed verbatim via
    # extra-params.scope in configmap.yaml. Override here to add or remove scopes.
    scope: "comments:create,issues:create,read,timeSchedule:write,write"
    # When non-empty, used verbatim as quarkus.oidc.linear.user-info-path. When empty, configmap.yaml
    # defaults to https://<application.host>/internal/linear/oauth-userinfo (mirrors datadog).
    userInfoPath: ""
    # Public HTTPS base for MoP (no path). Used only when userInfoPath is empty.
    syntheticUserInfoBaseUrl: ""
    # Set to true ONLY when userInfoPath points at the in-pod loopback
    # (https://localhost:<ssl-port>/...). Egress policies in stage/prod block the pod from
    # reaching its own public hostname, so synthetic UserInfo must round-trip via loopback,
    # which uses a self-signed cert that the JVM trust store does not accept. When true, the
    # configmap renders a `linear-insecure-client` named TLS config (trust-all + skip
    # hostname verification) and binds it to quarkus.oidc.linear.tls.tls-configuration-name.
    tlsInsecureClient: false
  # Oracle IDCS confidential OIDC client used by the Oracle EPM MCP. Quarkus tenant key is
  # `oracle-epm` (with a hyphen); the chart values key is `oracleEpm` (camelCase) so dot-notation
  # works in the Helm template. The configmap renders the literal hyphenated tenant name.
  oracleEpm:
    # remote-servers.endpoints[name=oracle-epm].endpoint — used by ConfigService when resolving
    # the OIDC remote-server config; the actual upstream OAuth/AS URLs are pinned in configmap.yaml.
    endpoint: "https://idcs-c0b7a2ce098d48a0a78b94a30f9e42a1.identity.oraclecloud.com"
    # Confidential client; client-id and client-secret are required. Same client_id is used in
    # local, stage, and prod per Oracle EPM OAuth setup.
    clientId:
    # Oracle's flat OIDC userinfo returns sub and preferred_username (both email-shaped) but
    # not a top-level `email` claim. The synthetic /internal/oracle-epm/oauth-userinfo proxy
    # projects `email` from preferred_username/sub so BaseResource.getUsername (which only
    # strips `@domain` when the claim NAME contains "email") yields the short id (e.g.
    # "yosrixp" for "yosrixp@yahooinc.com"). Matches every other email-shaped provider.
    claim: email
    # K8s secret key holding the Oracle IDCS client_secret. Same key is read by the canonical
    # L2 path (OracleEpmUpstreamRefreshClient) and the legacy passthrough
    # (TokenExchangeServiceOracleEpmImpl) so they always agree. Operator-tunable.
    clientSecretKey: "oracle-epm-client-secret"
    # Authorization scopes. `openid` is REQUIRED for Oracle to return id_token + a working
    # /userinfo response. `offline_access` is required for refresh tokens.
    scopes:
      - openid
      - urn:opc:resource:consumer::all
      - offline_access
    # Override Quarkus auth-server-url. Defaults to the IDCS host above.
    authServerUrl: ""
    # Override Quarkus jwks-path (relative to authServerUrl). Defaults to Oracle IDCS canonical
    # JWKS endpoint. The operator must enable "Access Signing Certificate" in the Oracle IDCS
    # Console (Settings > Default Settings) for this path to be reachable without an admin
    # bearer; without it, Quarkus falls back to /introspect which Oracle does not authorize.
    jwksPath: "/admin/v1/SigningCert/jwk"
    # When non-empty, used verbatim as quarkus.oidc.oracle-epm.user-info-path. When empty,
    # configmap.yaml defaults to https://<application.host>/internal/oracle-epm/oauth-userinfo.
    userInfoPath: ""
    # Public HTTPS base for MoP (no path). Used only when userInfoPath is empty.
    syntheticUserInfoBaseUrl: ""
    # Set to true ONLY when userInfoPath points at the in-pod loopback
    # (https://localhost:<ssl-port>/...). Egress policies in stage/prod block the pod from
    # reaching its own public hostname, so synthetic UserInfo must round-trip via loopback,
    # which uses a self-signed cert that the JVM trust store does not accept. When true, the
    # configmap renders an `oracle-epm-insecure-client` named TLS config (trust-all + skip
    # hostname verification) and binds it to quarkus.oidc.oracle-epm.tls.tls-configuration-name.
    tlsInsecureClient: false
  embrace:
    authServerUrl: "https://dash-api.embrace.io"
    authorizationUrl: "https://dash.embrace.io/oauth/authorize"
    tokenPath: "/oauth/token"
    jwksPath: "/.well-known/jwks.json"
    # Full UserInfo URL for synthetic Embrace UserInfo (same as quarkus user-info-path). When set, overrides syntheticUserInfoBaseUrl.
    userInfoPath: ""
    # Public HTTPS base for MoP (no path). Used only when userInfoPath is empty. Defaults to https://application.host if empty.
    syntheticUserInfoBaseUrl: ""
    # When true, MoP trusts any server cert for the embrace OIDC tenant (token/JWKS/UserInfo). Use only for broken TLS (e.g. synthetic UserInfo on localhost).
    tlsInsecureClient: false
    # Quarkus OidcProvider: "any" skips iss on self-signed internal ID tokens (id-token-required=false + synthetic UserInfo).
    tokenIssuer: "any"
    clientId:
    claim: sub
    clientSecretKey: embrace-client-secret
    clientSecretMethod: basic
    scopes:
      - mcp:read
      - mcp:write
      - mcp:tools:call

cleanup:
  enabled: true
  defaults:
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    backoffLimit: 2
    activeDeadlineSeconds: 600
    restartPolicy: OnFailure
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  jobs:
    - name: grafana
      enabled: true
      schedule: "*/15 * * * *"
    - name: splunk
      enabled: true
      schedule: "30 */2 * * *"

healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /q/health/live
      port:
      scheme: HTTPS
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /q/health/ready
      port:
      scheme: HTTPS
    initialDelaySeconds: 30
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 5
