quarkus:
  http:
    ssl-port:
    insecure-requests: disabled
    access-log:
      enabled: true
      pattern: "%h %t \"%r\" %s %b"
      exclude-pattern: "/q/.*"
    tls-configuration-name:
    ssl:
      client-auth: request
    auth:
      permission:
        health:
          paths: "/q/health/*"
          policy: "permit"
        embrace-internal-userinfo:
          paths: "/internal/embrace/oauth-userinfo"
          policy: permit
    cors:
      enabled: true
      origins: http://localhost:6274 # allow mcp inspector
      methods: GET,PUT,POST

  tls:
    protocols: "TLSv1.3,TLSv1.2"
    cipher-suites: "TLS_AES_128_GCM_SHA256,TLS_AES_256_GCM_SHA384,TLS_CHACHA20_POLY1305_SHA256,TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_ECDSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384,TLS_ECDHE_RSA_WITH_AES_128_CBC_SHA256,TLS_ECDHE_RSA_WITH_AES_256_CBC_SHA384,TLS_RSA_WITH_AES_128_GCM_SHA256,TLS_RSA_WITH_AES_256_GCM_SHA384"
    reload-period: "1h"

  log:
    console:
      format: "%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{2.}] (%t) %s%e%n"
    level: INFO
    category:
      "io.quarkus.oidc.runtime":
        level: INFO
        min-level: INFO

  oidc:
    auth-server-url:
    client-id: ${CLIENT_ID}
    credentials:
      client-secret:
        provider:
          key: ${CLIENT_SECRET}
        method: post
    authentication:
      scopes:
        - offline_access
      redirect-path: /authorize/callback
      restore-path-after-redirect: true
    application-type: web-app
    atlassian:
      auth-server-url: "https://auth.atlassian.com"
      client-id: ${ATLASSIAN_CLIENT_ID}
      credentials:
        client-secret:
          provider:
            key: ${ATLASSIAN_CLIENT_SECRET}
          method: post
      authentication:
        scopes:
          - read:me
          - read:account
          - offline_access
        redirect-path: /atlassian/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          audience: "api.atlassian.com"
          prompt: "consent"
        add-openid-scope: false
        id-token-required: false
      application-type: web-app
      user-info-path:
      token:
        issuer: any
    github:
      provider: github
      client-id: ${GITHUB_CLIENT_ID}
      credentials:
        client-secret:
          provider:
            key: ${GITHUB_CLIENT_SECRET}
          method: post
      authentication:
        scopes:
          - offline_access
        redirect-path: /github/authorize/callback
        restore-path-after-redirect: true
    google-drive:
      provider: google
      <<: &google-workspace-creds
        client-id: ${GOOGLE_WORKSPACE_CLIENT_ID}
        credentials:
          client-secret:
            provider:
              key: ${GOOGLE_WORKSPACE_CLIENT_SECRET_KEY}
            method: post
      authentication:
        scopes:
          - openid
        redirect-path: /google-drive/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-cloud-platform:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-cloud-platform/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-docs:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-docs/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-sheets:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-sheets/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-slides:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-slides/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-gmail:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-gmail/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-calendar:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-calendar/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-tasks:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-tasks/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-chat:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-chat/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-forms:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-forms/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-keep:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-keep/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    google-meet:
      provider: google
      <<: *google-workspace-creds
      authentication:
        scopes:
          - openid
        redirect-path: /google-meet/authorize/callback
        restore-path-after-redirect: true
        extra-params:
          access_type: "offline"
    slack:
      auth-server-url: "https://slack.com"
      discovery-enabled: false
      authorization-path: "/oauth/v2/authorize"
      token-path: "/api/oauth.v2.user.access"
      user-info-path: "https://slack.com/api/auth.test"
      client-id: ${SLACK_CLIENT_ID:}
      credentials:
        client-secret:
          provider:
            key: ${SLACK_CLIENT_SECRET_KEY:slack-client-secret}
          method: post
      authentication:
        scopes: []
        redirect-path: /slack/authorize/callback
        restore-path-after-redirect: true
        add-openid-scope: false
        id-token-required: false
        user-info-required: true
        verify-access-token: false
        extra-params:
          user_scope: "${SLACK_USER_SCOPES:users:read.email,users:read,search:read.users,search:read.public,search:read.private,groups:history,channels:history,canvases:read}"
      application-type: web-app
      allow-user-info-cache: false
      cache-user-info-in-idtoken: true
      token-state-manager:
        strategy: keep-all-tokens
      token:
        issuer: any
    embrace:
      discovery-enabled: false
      auth-server-url: ${EMBRACE_AUTH_SERVER_URL:https://dash-api.embrace.io}
      authorization-path: ${EMBRACE_AUTHORIZATION_URL:https://dash.embrace.io/oauth/authorize}
      token-path: ${EMBRACE_TOKEN_PATH:/oauth/token}
      jwks-path: ${EMBRACE_JWKS_PATH:/.well-known/jwks.json}
      user-info-path: ${MOP_EMBRACE_SYNTHETIC_USERINFO_URL:https://127.0.0.1/internal/embrace/oauth-userinfo}
      client-id: ${EMBRACE_CLIENT_ID:}
      credentials:
        client-secret:
          provider:
            key: ${EMBRACE_CLIENT_SECRET_KEY:embrace-client-secret}
          method: ${EMBRACE_CLIENT_SECRET_METHOD:basic}
      authentication:
        scopes:
          - mcp:read
          - mcp:write
          - mcp:tools:call
        redirect-path: /embrace/authorize/callback
        restore-path-after-redirect: true
        add-openid-scope: false
        id-token-required: false
        user-info-required: true
        verify-access-token: false
      application-type: web-app
      allow-user-info-cache: false
      cache-user-info-in-idtoken: true
      token-state-manager:
        strategy: keep-all-tokens
      token:
        # "any" skips iss validation on MoP-issued internal ID tokens (no top-level iss; UserInfo is under "userinfo").
        issuer: ${EMBRACE_TOKEN_ISSUER:any}
        verify-access-token-with-user-info: false

  otel:
    # Build-time in Quarkus: must be true at `mvn package` for runtime ConfigMap overrides to take effect.
    enabled: true
    # Required for application OTLP metrics (OauthProxyMetrics / mop_*). Disabled by default in Quarkus (tech preview).
    metrics:
      enabled: true
    # MoP uses OTLP for metrics (and traces); avoid OTLP log export noise when no collector or logs unused.
    logs:
      enabled: false
      handler:
        enabled: false
    instrument:
      # Stops "VertxTracer delegate not set" WARN from startup race (OIDC/HTTP before bridge; quarkus#37718).
      # Disables Vert.x HTTP trace spans only; mop_* metrics and non-Vert.x tracing are unaffected.
      vertx-http: false

  cache:
    caffeine:
      token-cache:
        initial-capacity:
        expire-after-write:
        maximum-size:
      code-cache:
        initial-capacity:
        expire-after-write:
        maximum-size:

server:
  metrics:
    region: ${AWS_REGION:}
  host: ${HOST}
  tls:
    certificate:
      path:
    private-key:
      path:
    refresh:
      interval:
    truststore:
      path:
  athenz:
    cert-file:
    key-file:
    truststore-file:
    user-prefix:
    zms:
      endpoint:
    zts:
      endpoint:
    register:
      domain:
      role:
    resource-authorization:
    authorization-action:
    authorization-domain:
  token-store:
    implementation:
    expiry:
    aws:
      dynamodb:
        table-name:
      kms:
        key-id:
  refresh-token:
    table-name: ${MOP_REFRESH_TOKEN_TABLE_NAME:mcp-oauth-proxy-refresh-tokens}
    expiry-seconds: ${MOP_REFRESH_EXPIRY_SECONDS:7776000}
    ttl-buffer-days: ${MOP_REFRESH_TTL_BUFFER_DAYS:7}
    # Layer 2 (rotated-grace window) — token-age predicate. When validate() finds a row in
    # ROTATED status whose rotated_at is within this many seconds, treat the call as a benign
    # client retry and serve from the family successor instead of revoking the family. Outside
    # this window the original stolen-RT defense (revoke family) still applies.
    # Default 7200s (2h) covers multi-window Cursor / Claude Desktop self-collisions where one
    # window's RT is up to a couple of hours stale relative to its sibling's. Per the sliding-
    # grace design, this is intended to widen to 172800s (48h) once Paranoids signs off, in
    # combination with family-idle-grace-seconds also at 172800s (see below).
    rotated-grace-seconds: ${MOP_REFRESH_ROTATED_GRACE_SECONDS:7200}
    # Layer 2 — family-idle predicate (defense-in-depth gate, opt-in). When > 0, the grace path
    # additionally requires that the family has had a successful rotation within this many
    # seconds. Bounds the window during which a stolen RT can quietly succeed against an
    # abandoned session. Set to 0 to disable.
    # Default 0 (off) for the 2h-token-age ship. Post-Paranoids target: 172800 (48h) to pair
    # with rotated-grace-seconds also at 172800 (48h).
    family-idle-grace-seconds: ${MOP_REFRESH_FAMILY_IDLE_GRACE_SECONDS:0}
    # Layer 1 (per-RT singleflight). Per-pod in-flight cache TTL: how long a freshly-rotated
    # result stays available so duplicate callers presenting the same RT receive the same outcome.
    inflight-cache-seconds: ${MOP_REFRESH_INFLIGHT_CACHE_SECONDS:30}
    # Per-RT distributed-lock TTL written into mcp-oauth-proxy-refresh-locks. Sized generously so
    # it comfortably outlasts any rotate() call (read + validate + TransactWrite) even under DDB
    # retry/throttling. Lock does NOT cover the upstream Okta refresh that follows; if a rotate
    # ever exceeds the TTL the next caller falls into the L2 grace path.
    inflight-lock-ttl-seconds: ${MOP_REFRESH_INFLIGHT_LOCK_TTL_SECONDS:30}
    # Retries for the per-RT lock. With initial-backoff-ms=100 and exponential doubling capped at
    # 2000ms, 12 retries ≈ 17s total wait — long enough that the loser usually finds the in-flight
    # cache populated by the lock holder, but bounded so a truly stuck holder doesn't block forever.
    inflight-lock-max-retries: ${MOP_REFRESH_INFLIGHT_LOCK_MAX_RETRIES:12}
    inflight-lock-initial-backoff-ms: ${MOP_REFRESH_INFLIGHT_LOCK_INITIAL_BACKOFF_MS:100}
  refresh-lock:
    table-name: ${MOP_REFRESH_LOCK_TABLE_NAME:mcp-oauth-proxy-refresh-locks}
    ttl-seconds: ${MOP_REFRESH_LOCK_TTL_SECONDS:8}
    instance-id: ${HOSTNAME:${MOP_REFRESH_LOCK_INSTANCE_ID:default}}
    max-retries: ${MOP_REFRESH_LOCK_MAX_RETRIES:5}
    initial-backoff-ms: ${MOP_REFRESH_LOCK_INITIAL_BACKOFF_MS:50}
  upstream-token:
    table-name: ${MOP_UPSTREAM_TOKEN_TABLE_NAME:mcp-oauth-proxy-upstream-tokens}
    expiry-seconds: ${MOP_UPSTREAM_TOKEN_EXPIRY_SECONDS:7776000}
    ttl-buffer-days: ${MOP_UPSTREAM_TOKEN_TTL_BUFFER_DAYS:7}
  # Dedicated index keyed by H(bearer) for /userinfo bearer resolution. Each minted bearer owns
  # its own row, so multi-window /userinfo no longer 401s on GSI clobbering. The row stores no
  # token material — only (userId, clientId, provider, exp, ttl). DynamoDB TTL evicts rows
  # naturally as their underlying bearers expire.
  bearer-index:
    table-name: ${MOP_BEARER_INDEX_TABLE_NAME:mcp-oauth-proxy-bearer-index}
    # Selects the BearerIndexStore producer in DataStoreProducer. {memory, enterprise}.
    # Defaults to "enterprise" for stage/prod; dev profile sets it to "memory".
    implementation: ${MOP_BEARER_INDEX_IMPLEMENTATION:enterprise}
  upstream:
    okta:
      session-cache:
        # Shared per-user Okta upstream session cache (L0 in-memory + L1 DDB). When enabled,
        # any provider/client refreshing or reading the user's Okta id/access token reuses the
        # most-recent fresh copy instead of calling Okta. Off by default; flip to true after
        # the stage soak. See docs/refresh-token/* and OktaSessionCacheConfig for details.
        enabled: ${MOP_OKTA_SESSION_CACHE_ENABLED:false}
        # Required remaining lifetime (seconds) for a /token-path cache hit. Covers the longest
        # downstream-exchange chain (Athenz ZTS + Google STS) with retries and clock skew.
        # Validated to [30, 600] at startup; same value in stage and prod.
        min-remaining-seconds: ${MOP_OKTA_SESSION_CACHE_MIN_REMAINING_SECONDS:120}
        # Caffeine maximumSize on the per-pod L0 tier. LRU eviction at the limit. [100, 100000].
        l0-max-size: ${MOP_OKTA_SESSION_CACHE_L0_MAX_SIZE:5000}
        # Caffeine expireAfterWrite on L0; default = one Okta access-token lifetime (1h).
        # Read-time freshness uses the entry's own min(idExp, accessExp) — there is intentionally
        # no expireAfterAccess. [600, 7200].
        l0-expire-after-write-seconds: ${MOP_OKTA_SESSION_CACHE_L0_EXPIRE_AFTER_WRITE_SECONDS:3600}
  cross-region-fallback:
    enabled: ${MOP_CROSS_REGION_FALLBACK_ENABLED:false}
    region: ${MOP_CROSS_REGION_FALLBACK_REGION:}
    table-name: ${MOP_CROSS_REGION_FALLBACK_TABLE_NAME:}
    kms:
      key-id: ${MOP_CROSS_REGION_FALLBACK_KMS_KEY_ID:}
    sts:
      role-arn: ${MOP_CROSS_REGION_FALLBACK_STS_ROLE_ARN:}
    refresh-token:
      table-name: ${MOP_CROSS_REGION_FALLBACK_REFRESH_TOKEN_TABLE_NAME:}
    upstream-token:
      table-name: ${MOP_CROSS_REGION_FALLBACK_UPSTREAM_TOKEN_TABLE_NAME:}
    bearer-index:
      table-name: ${MOP_CROSS_REGION_FALLBACK_BEARER_INDEX_TABLE_NAME:}
    refresh-token-and-upstream:
      enabled: ${MOP_CROSS_REGION_FALLBACK_REFRESH_TOKEN_AND_UPSTREAM_ENABLED:true}
  secret:
    k8s:
      name:
      namespace:
  token-exchange:
    idp:
    google-workspace:
      client-id: ${GOOGLE_WORKSPACE_CLIENT_ID}
      client-secret-key: ${GOOGLE_WORKSPACE_CLIENT_SECRET_KEY}
    splunk:
      admin-token-secret-key: splunk-api-stage
      mirror-user-prefix: mcp.
      allowed-roles:
        - yahoo_user
        - mcp_user
      splunk-token-audience: mcp
      token-expires-on: "+1h"
      cleanup-enabled: true
    grafana:
      admin-token-secret-key: grafana-api-prod
      token-name-prefix: "mcp."
      seconds-to-live: 3600
      cleanup-enabled: true
    evaluate:
      audience: ${EVALUATE_ZTS_AUDIENCE:evaluateplus.k8s.evaluate-elide-production}
      scopes:
        - openid
        - ${EVALUATE_ZTS_SCOPE:evaluateplus.k8s:role.evaluate-mcp-user}
    databricks-sql:
      workspace-host-template: "https://%s.cloud.databricks.com"
      resource-path-prefix: "/v1/databricks-sql/"
      workspace-segment-pattern: "^dbc-[a-zA-Z0-9.-]+$"
      oauth-scope: sql
    databricks-vector-search:
      workspace-host-template: "https://%s.cloud.databricks.com"
      resource-path-prefix: "/v1/databricks-vector-search/"
      workspace-segment-pattern: "^dbc-[a-zA-Z0-9.-]+$"
      oauth-scope: vector-search
    remote-servers:
      endpoints:
        - name:
          endpoint:
          username-claim:
        - name: splunk
          endpoint: ${SPLUNK_MGMT_URL:https://localhost:8089}
          username-claim: short_id
        - name: grafana
          endpoint: ${GRAFANA_API_URL:https://yahooinc.grafana.net}
          username-claim: short_id
          service-account-id: ${GRAFANA_SERVICE_ACCOUNT_ID:}
        - name: evaluate
          endpoint: ${EVALUATE_MCP_URL:https://evaluate-elide-api.data.yahoo.com/}
          username-claim: short_id

  resources:
    resource-mapping:
      - uri:
        domain:
        scopes: []
        token:
          idp:
          as:
          jag:
            enabled:
            issuer:

"%cleanup":
  quarkus:
    http:
      host-enabled: false
    arc:
      remove-unused-beans: false
